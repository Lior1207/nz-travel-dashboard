<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Trip Editor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    padding-bottom: 3rem;
  }

  header {
    background: #141927;
    border-bottom: 1px solid #1e2a45;
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  header h1 { font-size: 1.1rem; font-weight: 700; color: #c8d8f0; }
  header a  { font-size: 0.8rem; color: #5a7aaa; text-decoration: none; }
  header a:hover { color: #94a3b8; }

  /* ── Lock screen ── */
  #lock-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
    gap: 1rem;
    padding: 2rem;
  }

  #lock-screen h2 { font-size: 1.3rem; color: #c8d8f0; }
  #lock-screen p  { font-size: 0.85rem; color: #5a7aaa; text-align: center; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    border-bottom: 1px solid #1e2a45;
    overflow-x: auto;
    background: #141927;
  }

  .tab {
    flex: 1;
    padding: 0.85rem 0.5rem;
    text-align: center;
    font-size: 0.8rem;
    font-weight: 600;
    color: #3d5a80;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s;
    min-width: 60px;
  }

  .tab.active { color: #60a5fa; border-bottom-color: #60a5fa; }
  .tab:hover  { color: #7891b5; }

  /* ── Content ── */
  .content { padding: 1.5rem; max-width: 600px; margin: 0 auto; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── Form elements ── */
  .field { margin-bottom: 1rem; }

  label {
    display: block;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #5a7aaa;
    margin-bottom: 0.4rem;
  }

  input, select, textarea {
    width: 100%;
    background: #1a2235;
    border: 1px solid #263a5e;
    border-radius: 8px;
    color: #c8d8f0;
    font-size: 1rem;
    padding: 0.75rem 1rem;
    outline: none;
    -webkit-appearance: none;
    transition: border-color 0.15s;
  }

  input:focus, select:focus, textarea:focus { border-color: #3a6aaa; }
  input[type="date"] { color-scheme: dark; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

  /* ── Buttons ── */
  .btn-save {
    width: 100%;
    background: #166534;
    border: none;
    border-radius: 10px;
    color: #4ade80;
    font-size: 1rem;
    font-weight: 700;
    padding: 1rem;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: background 0.15s;
  }

  .btn-save:hover    { background: #1a7a3e; }
  .btn-save:disabled { background: #0f2e1a; color: #2d6b40; cursor: not-allowed; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #166534;
    color: #4ade80;
    padding: 0.75rem 1.5rem;
    border-radius: 10px;
    font-weight: 600;
    font-size: 0.9rem;
    transition: transform 0.3s;
    z-index: 999;
    white-space: nowrap;
  }

  #toast.show  { transform: translateX(-50%) translateY(0); }
  #toast.error { background: #7f1d1d; color: #fca5a5; }

  /* ── Existing items list ── */
  .existing { margin-top: 1.5rem; }
  .existing h3 { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #3d5a80; margin-bottom: 0.75rem; }

  .item-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #141927;
    border: 1px solid #1e2a45;
    border-radius: 8px;
    padding: 0.75rem 1rem;
    margin-bottom: 0.5rem;
    gap: 0.75rem;
  }

  .item-row .item-label { font-size: 0.88rem; color: #c8d8f0; }
  .item-row .item-sub   { font-size: 0.75rem; color: #5a7aaa; margin-top: 0.1rem; }

  .btn-delete {
    background: none;
    border: 1px solid #3d2020;
    border-radius: 6px;
    color: #7f4040;
    font-size: 0.75rem;
    padding: 0.25rem 0.6rem;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }

  .btn-delete:hover { background: #3d1515; color: #fca5a5; border-color: #7f1d1d; }

  /* ── Todo checkboxes ── */
  .todo-check-row {
    display: flex;
    align-items: center;
    gap: 0.85rem;
    background: #141927;
    border: 1px solid #1e2a45;
    border-radius: 8px;
    padding: 0.85rem 1rem;
    margin-bottom: 0.5rem;
    cursor: pointer;
    transition: background 0.1s;
  }

  .todo-check-row:hover { background: #1a2235; }
  .todo-check-row.done  { opacity: 0.5; }

  .todo-box {
    width: 20px;
    height: 20px;
    border-radius: 5px;
    border: 2px solid #2d4060;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    color: #4ade80;
    transition: background 0.15s;
  }

  .todo-check-row.done .todo-box { background: #052e16; border-color: #166534; }
  .todo-name { font-size: 0.9rem; color: #c8d8f0; }
  .todo-check-row.done .todo-name { text-decoration: line-through; color: #3d5a80; }

  /* ── Section divider ── */
  .divider { border: none; border-top: 1px solid #1e2a45; margin: 1.5rem 0; }

  /* ── Password field ── */
  .pw-input {
    width: 100%;
    max-width: 280px;
    background: #1a2235;
    border: 1px solid #263a5e;
    border-radius: 10px;
    color: #c8d8f0;
    font-size: 1.1rem;
    padding: 0.85rem 1rem;
    text-align: center;
    outline: none;
    letter-spacing: 0.1em;
  }

  .pw-btn {
    background: #1e3a60;
    border: none;
    border-radius: 10px;
    color: #60a5fa;
    font-size: 1rem;
    font-weight: 700;
    padding: 0.85rem 2rem;
    cursor: pointer;
    transition: background 0.15s;
  }

  .pw-btn:hover { background: #2a4a7a; }
  .pw-error { color: #fca5a5; font-size: 0.85rem; }
</style>
</head>
<body>

<div id="lock-screen">
  <div style="font-size:2.5rem">🔒</div>
  <h2>Trip Editor</h2>
  <p>Enter the password to manage your trip</p>
  <input class="pw-input" type="password" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')unlock()">
  <button class="pw-btn" onclick="unlock()">Unlock</button>
  <p class="pw-error" id="pw-error"></p>
</div>

<div id="app" style="display:none">

  <header>
    <h1>✏️ Trip Editor</h1>
    <a href="/">← Dashboard</a>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="showTab('hotels')">🏨 Hotel</div>
    <div class="tab" onclick="showTab('flights')">✈️ Flight</div>
    <div class="tab" onclick="showTab('activities')">⭐ Activity</div>
    <div class="tab" onclick="showTab('todos')">✅ To Do</div>
  </div>

  <div class="content">

    <!-- Hotels -->
    <div class="panel active" id="panel-hotels">
      <div class="field"><label>Hotel / Place name</label><input type="text" id="h-name" placeholder="e.g. Novotel Queenstown"></div>
      <div class="field"><label>City</label><input type="text" id="h-city" placeholder="e.g. Queenstown"></div>
      <div class="row">
        <div class="field"><label>Check-in</label><input type="date" id="h-checkin"></div>
        <div class="field"><label>Check-out</label><input type="date" id="h-checkout"></div>
      </div>
      <div class="field">
        <label>Booked via</label>
        <select id="h-via">
          <option>Booking.com</option>
          <option>Airbnb</option>
          <option>Hotels.com</option>
          <option>Expedia</option>
          <option>Direct</option>
          <option>Private stay</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field"><label>Confirmation # (optional)</label><input type="text" id="h-ref" placeholder="e.g. QT8821"></div>
      <div class="field"><label>Notes (optional)</label><input type="text" id="h-notes" placeholder="Any extra info"></div>
      <button class="btn-save" onclick="saveHotel()">Save Hotel</button>

      <div class="existing" id="hotels-list"></div>
    </div>

    <!-- Flights -->
    <div class="panel" id="panel-flights">
      <div class="row">
        <div class="field"><label>From</label><input type="text" id="f-from" placeholder="e.g. CHC"></div>
        <div class="field"><label>To</label><input type="text" id="f-to" placeholder="e.g. AKL"></div>
      </div>
      <div class="field"><label>Date</label><input type="date" id="f-date"></div>
      <div class="row">
        <div class="field"><label>Departs</label><input type="time" id="f-departs"></div>
        <div class="field"><label>Arrives</label><input type="time" id="f-arrives"></div>
      </div>
      <div class="field"><label>Airline & flight #</label><input type="text" id="f-airline" placeholder="e.g. Air New Zealand NZ523"></div>
      <div class="field"><label>Booking ref (optional)</label><input type="text" id="f-ref" placeholder="e.g. ABC123"></div>
      <div class="field"><label>Sleep that night</label><input type="text" id="f-sleep" placeholder="e.g. Auckland (or leave blank if overnight)"></div>
      <button class="btn-save" onclick="saveFlight()">Save Flight</button>

      <div class="existing" id="flights-list"></div>
    </div>

    <!-- Activities -->
    <div class="panel" id="panel-activities">
      <div class="field"><label>Activity</label><input type="text" id="a-name" placeholder="e.g. Hobbiton Tour"></div>
      <div class="field"><label>Date</label><input type="date" id="a-date"></div>
      <div class="field"><label>Time (optional)</label><input type="time" id="a-time"></div>
      <div class="field"><label>Notes (optional)</label><input type="text" id="a-notes" placeholder="e.g. Pre-booked, ref XYZ"></div>
      <button class="btn-save" onclick="saveActivity()">Save Activity</button>

      <div class="existing" id="activities-list"></div>
    </div>

    <!-- Todos -->
    <div class="panel" id="panel-todos">
      <p style="font-size:0.85rem;color:#5a7aaa;margin-bottom:1rem;">Tap any item to mark it done.</p>
      <div id="todos-list"></div>
    </div>

  </div>
</div>

<div id="toast">✓ Saved! Dashboard updating…</div>

<script>
  let pw = '';
  let tripData = null;

  function unlock() {
    const input = document.getElementById('pw-input').value.trim();
    if (!input) return;
    pw = input;
    // Try fetching data to verify password works
    fetch('/trip-data.json')
      .then(r => r.json())
      .then(data => {
        tripData = data;
        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        renderExisting();
      })
      .catch(() => {
        document.getElementById('pw-error').textContent = 'Could not load trip data.';
      });
  }

  function showTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['hotels','flights','activities','todos'][i] === name);
    });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
  }

  // ── Toast ──────────────────────────────────────────
  function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show' + (isError ? ' error' : '');
    setTimeout(() => t.className = '', 3000);
  }

  // ── API call ───────────────────────────────────────
  async function save(action, data) {
    const btns = document.querySelectorAll('.btn-save');
    btns.forEach(b => { b.disabled = true; b.textContent = 'Saving…'; });

    try {
      const res = await fetch('/api/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw, action, data }),
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || 'Save failed');

      // Refresh local data
      const r2 = await fetch('/trip-data.json?t=' + Date.now());
      tripData = await r2.json();
      renderExisting();
      showToast('✓ Saved! Dashboard updating…', false);
    } catch(e) {
      showToast('✗ ' + e.message, true);
    } finally {
      btns.forEach(b => { b.disabled = false; b.textContent = b.textContent.replace('Saving…', 'Save'); });
    }
  }

  // ── Hotels ─────────────────────────────────────────
  async function saveHotel() {
    const checkIn  = document.getElementById('h-checkin').value;
    const checkOut = document.getElementById('h-checkout').value;
    const name     = document.getElementById('h-name').value.trim();
    const city     = document.getElementById('h-city').value.trim();
    if (!name || !city || !checkIn || !checkOut) { showToast('Fill in name, city and dates', true); return; }

    const nights = Math.round((new Date(checkOut) - new Date(checkIn)) / 86400000);
    await save('addHotel', {
      name, city, checkIn, checkOut, nights,
      bookedVia:    document.getElementById('h-via').value,
      confirmation: document.getElementById('h-ref').value.trim(),
      notes:        document.getElementById('h-notes').value.trim(),
    });

    ['h-name','h-city','h-checkin','h-checkout','h-ref','h-notes'].forEach(id => document.getElementById(id).value = '');
  }

  // ── Flights ────────────────────────────────────────
  async function saveFlight() {
    const from    = document.getElementById('f-from').value.trim().toUpperCase();
    const to      = document.getElementById('f-to').value.trim().toUpperCase();
    const date    = document.getElementById('f-date').value;
    const departs = document.getElementById('f-departs').value;
    const arrives = document.getElementById('f-arrives').value;
    const airline = document.getElementById('f-airline').value.trim();
    const ref     = document.getElementById('f-ref').value.trim();
    const sleep   = document.getElementById('f-sleep').value.trim() || null;

    if (!from || !to || !date || !airline) { showToast('Fill in route, date and airline', true); return; }

    const sub = [departs ? `Departs ${departs}` : '', arrives ? `Arr ${arrives}` : '', airline, ref].filter(Boolean).join(' · ');
    await save('addFlight', {
      date,
      label: `✈️ ${from} → ${to}`,
      sub,
      sleep,
    });

    ['f-from','f-to','f-date','f-departs','f-arrives','f-airline','f-ref','f-sleep'].forEach(id => document.getElementById(id).value = '');
  }

  // ── Activities ─────────────────────────────────────
  async function saveActivity() {
    const label = document.getElementById('a-name').value.trim();
    const date  = document.getElementById('a-date').value;
    if (!label || !date) { showToast('Fill in activity name and date', true); return; }

    await save('addActivity', {
      date,
      label,
      time:  document.getElementById('a-time').value || null,
      notes: document.getElementById('a-notes').value.trim(),
    });

    ['a-name','a-date','a-time','a-notes'].forEach(id => document.getElementById(id).value = '');
  }

  // ── Todos ──────────────────────────────────────────
  async function toggleTodo(id, currentDone) {
    await save('toggleTodo', { id, done: !currentDone });
  }

  // ── Render existing items ──────────────────────────
  function renderExisting() {
    if (!tripData) return;

    // Hotels
    const hotelEl = document.getElementById('hotels-list');
    if (tripData.HOTELS.length) {
      hotelEl.innerHTML = '<h3>Current hotels</h3>' + tripData.HOTELS.map((h, i) => `
        <div class="item-row">
          <div>
            <div class="item-label">🏨 ${h.name} — ${h.city}</div>
            <div class="item-sub">${h.checkIn} → ${h.checkOut} · ${h.bookedVia}${h.confirmation ? ' · ' + h.confirmation : ''}</div>
          </div>
          <button class="btn-delete" onclick="deleteHotel(${i})">Remove</button>
        </div>`).join('');
    } else {
      hotelEl.innerHTML = '';
    }

    // Flights
    const flightEl = document.getElementById('flights-list');
    flightEl.innerHTML = '<h3 style="margin-top:1.5rem;font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#3d5a80;margin-bottom:0.75rem">Current flights</h3>' +
      tripData.FLIGHTS.map(f => `
        <div class="item-row">
          <div>
            <div class="item-label">${f.label}</div>
            <div class="item-sub">${f.date} · ${f.sub}</div>
          </div>
        </div>`).join('');

    // Activities
    const actEl = document.getElementById('activities-list');
    if (tripData.ACTIVITIES.length) {
      actEl.innerHTML = '<h3 style="margin-top:1.5rem;font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#3d5a80;margin-bottom:0.75rem">Scheduled activities</h3>' +
        tripData.ACTIVITIES.map((a, i) => `
          <div class="item-row">
            <div>
              <div class="item-label">⭐ ${a.label}</div>
              <div class="item-sub">${a.date}${a.time ? ' · ' + a.time : ''}${a.notes ? ' · ' + a.notes : ''}</div>
            </div>
            <button class="btn-delete" onclick="deleteActivity(${i})">Remove</button>
          </div>`).join('');
    } else {
      actEl.innerHTML = '';
    }

    // Todos
    const todoEl = document.getElementById('todos-list');
    todoEl.innerHTML = tripData.TODOS.map(t => `
      <div class="todo-check-row ${t.done ? 'done' : ''}" onclick="toggleTodo('${t.id}', ${t.done})">
        <div class="todo-box">${t.done ? '✓' : ''}</div>
        <div class="todo-name">${t.label}</div>
      </div>`).join('');
  }

  async function deleteHotel(index) {
    if (!confirm('Remove this hotel?')) return;
    await save('deleteHotel', { index });
  }

  async function deleteActivity(index) {
    if (!confirm('Remove this activity?')) return;
    await save('deleteActivity', { index });
  }
</script>

</body>
</html>
